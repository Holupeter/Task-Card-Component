<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager | Stage 0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <article class="todo-card" data-testid="test-todo-card">
            
            <header class="card-header">
                <div class="title-group">
                    <input type="checkbox" id="todo-toggle" data-testid="test-todo-complete-toggle" aria-label="Mark task as complete">
                    <h2 id="task-title" data-testid="test-todo-title">Refactor Solar Module API</h2>
                </div>
                <span class="priority-badge low" data-testid="test-todo-priority" aria-label="Priority: Low">
                    Low
                </span>
            </header>

            <div class="card-body">
                <p data-testid="test-todo-description">
                    Optimize the data fetching logic for the energy monitoring dashboard to reduce latency by 20%.
                </p>
                
                <ul class="tag-list" data-testid="test-todo-tags" role="list">
                    <li data-testid="test-todo-tag-work">Work</li>
                    <li data-testid="test-todo-tag-urgent">Tech</li>
                </ul>
            </div>

            <footer class="card-footer">
                <div class="date-info">
                    <time datetime="2026-03-01" data-testid="test-todo-due-date">Due Mar 1, 2026</time>
                    <time id="time-remaining" data-testid="test-todo-time-remaining" aria-live="polite">
                        Due in 3 days
                    </time>
                </div>
                
                <div class="actions">
                    <button class="btn-icon" data-testid="test-todo-edit-button" aria-label="Edit Task">&#9998;</button>
                    <button class="btn-icon delete" data-testid="test-todo-delete-button" aria-label="Delete Task">&#128465;</button>
                </div>
            </footer>

            <div class="status-bar" data-testid="test-todo-status">Pending</div>

        </article>
    </main>

    <script src="script.js"></script>
</body>
</html>
